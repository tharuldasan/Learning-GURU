<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS // Precision Tracking</title>
    <style>
        :root { --bg: #030307; --cyan: #00ffff; --red: #ff0055; }
        body { margin: 0; background: var(--bg); color: white; font-family: monospace; }
        .dashboard { display: grid; grid-template-columns: 640px 1fr; gap: 20px; padding: 20px; }
        .feed-container { position: relative; width: 640px; height: 480px; }
        #webcam, #outputCanvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        .data-panel { background: #111; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        .val { font-size: 2rem; color: var(--cyan); margin-bottom: 20px; }
        .countdown { color: var(--red); font-size: 3rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="feed-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="outputCanvas"></canvas>
        </div>
        <div class="data-panel">
            <div>Blink Sensitivity (Left): <span id="lBlink" class="val">0.00</span></div>
            <div>Blink Sensitivity (Right): <span id="rBlink" class="val">0.00</span></div>
            <div>SOMNOLENCE RISK:</div>
            <div id="countdown" class="countdown">20.0s</div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const countdownEl = document.getElementById('countdown');
        
        let faceLandmarker, isAlarmActive = false;
        let eyesClosedStart = 0;
        let alarmOsc, audioCtx;

        async function init() {
            // Setup Camera
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            
            // Sync Canvas to Video
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            };

            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
                runningMode: "VIDEO",
                outputFaceBlendshapes: true
            });
            predict();
        }

        function predict() {
            const results = faceLandmarker.detectForVideo(video, performance.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.faceLandmarks.length > 0) {
                // Draw Mesh
                const drawingUtils = new DrawingUtils(ctx);
                drawingUtils.drawConnectors(results.faceLandmarks[0], FaceLandmarker.FACE_LANDMARKS_TESSELATION, {color: '#00ffff', lineWidth: 1});

                // Get Blink Scores (0.0 = Open, 1.0 = Closed)
                const blendshapes = results.faceBlendshapes[0].categories;
                const leftBlink = blendshapes.find(s => s.categoryName === 'eyeBlinkLeft').score;
                const rightBlink = blendshapes.find(s => s.categoryName === 'eyeBlinkRight').score;
                
                document.getElementById('lBlink').innerText = leftBlink.toFixed(2);
                document.getElementById('rBlink').innerText = rightBlink.toFixed(2);

                // Logic: If average > 0.5, eyes are closed
                if ((leftBlink + rightBlink) / 2 > 0.5) {
                    if (eyesClosedStart === 0) eyesClosedStart = Date.now();
                    const closedFor = (Date.now() - eyesClosedStart) / 1000;
                    countdownEl.innerText = (20 - closedFor).toFixed(1) + "s";
                    
                    if (closedFor >= 5) triggerAlarm(); // Reduced to 5s for testing
                } else {
                    eyesClosedStart = 0;
                    countdownEl.innerText = "20.0s";
                    stopAlarm();
                }
            }
            requestAnimationFrame(predict);
        }

        function triggerAlarm() {
            if (isAlarmActive) return;
            isAlarmActive = true;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            alarmOsc = audioCtx.createOscillator();
            alarmOsc.connect(audioCtx.destination);
            alarmOsc.start();
        }

        function stopAlarm() {
            if (!isAlarmActive) return;
            isAlarmActive = false;
            if (alarmOsc) alarmOsc.stop();
        }

        init();
    </script>
</body>
</html>
