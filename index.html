<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Phonk & Focus</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            background: #0a0a0a;
            color: #fff;
            text-align: center;
            transition: background 0.1s;
        }
        h1 {
            color: #b026ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #webcam {
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.5);
            transform: scaleX(-1);
            max-width: 100%;
            border: 2px solid #b026ff;
            margin-top: 20px;
            background: #111;
        }
        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            background: #b026ff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 20px;
            box-shadow: 0 0 15px #b026ff;
            transition: 0.2s;
            text-transform: uppercase;
        }
        button:hover {
            background: #d066ff;
            box-shadow: 0 0 30px #d066ff;
        }
        #status {
            font-size: 1.2rem;
            margin: 20px;
            color: #ffcc00;
            font-weight: bold;
        }
        .hidden { display: none !important; }
        #youtube-player {
            position: absolute;
            left: -9999px; 
        }
    </style>
</head>
<body>
    <h1>Phonk & Focus</h1>
    <p>Instant Start. Music plays immediately while AI loads in the background.</p>
    
    <button id="startBtn">Initiate System</button>
    
    <div id="app" class="hidden">
        <div id="status">Starting music...</div>
        <video id="webcam" autoplay playsinline width="640" height="480"></video>
        <div id="youtube-player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    
    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let faceLandmarker;
        let video;
        let lastVideoTime = -1;
        let ytPlayer;
        let ytReady = false;

        // Tracking timers
        let closedEyesStartTime = null;
        let lastMoveTime = Date.now();
        let lastNosePos = null;

        // Audio system
        let audioCtx;
        let oscillator;
        let isAlarmRinging = false;
        let alarmInterval;
        const TIME_LIMIT_MS = 20000; 

        const startBtn = document.getElementById('startBtn');
        const statusText = document.getElementById('status');
        const appDiv = document.getElementById('app');

        // 1. Load YouTube instantly with a single long video ID instead of a heavy playlist
        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('youtube-player', {
                height: '10', 
                width: '10',
                videoId: '4FdK9He8bLw', // A popular long Phonk Mix. You can swap this ID with any YouTube video.
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'start': Math.floor(Math.random() * 1800) // Starts at a random spot so it feels different every time
                },
                events: {
                    'onReady': () => { ytReady = true; },
                    'onStateChange': (e) => {
                        // If the long video ends, loop it back to the beginning
                        if (e.data === YT.PlayerState.ENDED) { ytPlayer.playVideo(); }
                    }
                }
            });
        };

        // 2. Click is active IMMEDIATELY
        startBtn.addEventListener('click', async () => {
            startBtn.classList.add('hidden');
            appDiv.classList.remove('hidden');
            
            // Start browser audio engine
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Trigger music right now
            playMusicAttempts();

            // Fire up the webcam
            video = document.getElementById('webcam');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                statusText.innerText = "Webcam blocked. Music will play, but tracking is off.";
                statusText.style.color = "red";
                return;
            }

            // Download the AI weights silently in the background while the user listens to music
            statusText.innerText = "🎵 Music active. Booting up eye-tracking AI in background...";
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU"
                    },
                    outputFaceBlendshapes: true,
                    runningMode: "VIDEO",
                    numFaces: 1
                });

                statusText.innerText = "System Fully Operational | AI Active";
                statusText.style.color = "#0f0";
                video.addEventListener("loadeddata", predictWebcam);
            } catch (e) {
                statusText.innerText = "AI failed to load. Music will keep playing.";
            }
        });

        // Safe loop to force YouTube to play the absolute millisecond it responds
        function playMusicAttempts() {
            if (ytReady && typeof ytPlayer.playVideo === 'function') {
                ytPlayer.playVideo();
            } else {
                setTimeout(playMusicAttempts, 100);
            }
        }

        // 3. AI Tracking Loop
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                if (faceLandmarker) {
                    const results = faceLandmarker.detectForVideo(video, performance.now());
                    processResults(results);
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        function processResults(results) {
            if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                const landmarks = results.faceLandmarks[0];
                const blendshapes = results.faceBlendshapes[0].categories;
                
                // Motion check
                const nose = landmarks[1];
                if (lastNosePos) {
                    const dist = Math.sqrt(Math.pow(nose.x - lastNosePos.x, 2) + Math.pow(nose.y - lastNosePos.y, 2));
                    if (dist > 0.003) lastMoveTime = Date.now(); 
                }
                lastNosePos = nose;

                // Eye check
                let blinkLeft = 0, blinkRight = 0;
                for (const shape of blendshapes) {
                    if (shape.categoryName === "eyeBlinkLeft") blinkLeft = shape.score;
                    if (shape.categoryName === "eyeBlinkRight") blinkRight = shape.score;
                }

                if (blinkLeft > 0.4 && blinkRight > 0.4) {
                    if (!closedEyesStartTime) closedEyesStartTime = Date.now();
                } else {
                    closedEyesStartTime = null; 
                }

                evaluateState();
            } else {
                closedEyesStartTime = null;
                evaluateState();
            }
        }

        function evaluateState() {
            const eyesClosedDuration = closedEyesStartTime ? (Date.now() - closedEyesStartTime) : 0;
            const timeSinceLastMove = Date.now() - lastMoveTime;

            if (eyesClosedDuration > 0) {
                statusText.innerText = `Eyes closed: ${(eyesClosedDuration/1000).toFixed(1)}s | Still: ${(timeSinceLastMove/1000).toFixed(1)}s`;
                statusText.style.color = "orange";
            } else if (faceLandmarker) {
                statusText.innerText = "System Active | Tracking Eyes & Movement";
                statusText.style.color = "#0f0";
            }

            if (eyesClosedDuration >= TIME_LIMIT_MS && timeSinceLastMove >= TIME_LIMIT_MS) {
                triggerAlarm();
            } else {
                stopAlarmAndResumePhonk();
            }
        }

        function triggerAlarm() {
            if (ytReady) ytPlayer.pauseVideo();
            if (isAlarmRinging) return;
            isAlarmRinging = true;
            
            document.body.style.background = '#900';
            statusText.innerText = "WAKE UP!!!";
            statusText.style.color = "white";

            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(450, audioCtx.currentTime);
            
            let gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            
            alarmInterval = setInterval(() => {
                if(!isAlarmRinging) return;
                oscillator.frequency.value = oscillator.frequency.value === 450 ? 900 : 450;
            }, 100);
        }

        function stopAlarmAndResumePhonk() {
            if (isAlarmRinging) {
                isAlarmRinging = false;
                document.body.style.background = '#0a0a0a';
                clearInterval(alarmInterval);
                if(oscillator) {
                    try { oscillator.stop(); oscillator.disconnect(); } catch(e){}
                }
            }
            if (ytReady && ytPlayer.getPlayerState() !== 1) {
                ytPlayer.playVideo();
            }
        }
    </script>
</body>
</html>
