<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS // Visual Telemetry</title>
    <style>
        :root {
            --bg-deep: #030307;
            --panel-bg: rgba(10, 10, 20, 0.75);
            --neon-cyan: #00ffff;
            --text-main: #e2e8f0;
        }

        body { margin: 0; background: var(--bg-deep); color: var(--text-main); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* Dashboard Layout */
        .dashboard { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1200px; margin: 20px auto; padding: 20px; }
        
        .feed-container { position: relative; background: var(--panel-bg); border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 8px; overflow: hidden; height: 480px; }
        #webcam, #outputCanvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        
        .telemetry-panel { display: flex; flex-direction: column; gap: 20px; }
        .metric-card { background: var(--panel-bg); border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 8px; padding: 20px; }
        .metric-title { font-size: 0.8rem; color: #a0aec0; text-transform: uppercase; margin-bottom: 5px; }
        .metric-value { font-size: 1.5rem; font-family: monospace; color: var(--neon-cyan); }
        
        .btn-launch { padding: 20px 40px; font-size: 1.5rem; background: var(--neon-cyan); color: #000; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .center-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="startScreen" class="center-screen">
        <button id="launchBtn" class="btn-launch">ACTIVATE VISUAL TELEMETRY</button>
    </div>

    <div id="dashboard" class="dashboard hidden">
        <div class="feed-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="outputCanvas"></canvas>
        </div>

        <div class="telemetry-panel">
            <div class="metric-card">
                <div class="metric-title">Left Eyelid Aperture</div>
                <div class="metric-value" id="leftApertureVal">0.00 mm</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Right Eyelid Aperture</div>
                <div class="metric-value" id="rightApertureVal">0.00 mm</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Movement State</div>
                <div class="metric-value" id="motionVal">CALIBRATING...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const launchBtn = document.getElementById('launchBtn');
        const dashboard = document.getElementById('dashboard');
        const startScreen = document.getElementById('startScreen');
        
        let faceLandmarker;
        let lastVideoTime = -1;

        // UI Targets
        const leftApertureVal = document.getElementById('leftApertureVal');
        const rightApertureVal = document.getElementById('rightApertureVal');
        const motionVal = document.getElementById('motionVal');

        launchBtn.addEventListener('click', async () => {
            startScreen.classList.add('hidden');
            dashboard.classList.remove('hidden');

            // Setup Camera
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            };

            // Setup Mediapipe
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
                runningMode: "VIDEO",
                outputFaceBlendshapes: true
            });

            renderLoop();
        });

        function renderLoop() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                // Clear Canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    const drawingUtils = new DrawingUtils(ctx);
                    
                    // Draw visual mesh
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_TESSELATION, {color: '#00ffff', lineWidth: 1});
                    
                    // Calculate Eyes
                    const leftDist = Math.abs(landmarks[159].y - landmarks[145].y) * 1000;
                    const rightDist = Math.abs(landmarks[386].y - landmarks[374].y) * 1000;
                    
                    leftApertureVal.innerText = `${leftDist.toFixed(2)} mm`;
                    rightApertureVal.innerText = `${rightDist.toFixed(2)} mm`;
                    motionVal.innerText = "DETECTED";
                } else {
                    motionVal.innerText = "NO FACE FOUND";
                }
            }
            requestAnimationFrame(renderLoop);
        }
    </script>
</body>
</html>
