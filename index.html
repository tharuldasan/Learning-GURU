<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS // Precision Tracking v2</title>
    <style>
        :root { --bg: #030307; --cyan: #00ffff; --red: #ff0055; --amber: #ffcc00; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; }
        .dashboard { display: grid; grid-template-columns: 640px 1fr; gap: 20px; padding: 20px; }
        .feed-container { position: relative; width: 640px; height: 480px; border: 1px solid #333; }
        #webcam, #outputCanvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        .data-panel { background: #111; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        .val { font-size: 1.5rem; color: var(--cyan); margin-bottom: 20px; }
        .status-badge { font-size: 1.2rem; font-weight: bold; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 20px; }
        .state-monitoring { background: #004400; color: #00ff00; }
        .state-alarming { background: #440000; color: #ff0000; }
        .state-cooldown { background: #443300; color: var(--amber); }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="feed-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="outputCanvas"></canvas>
        </div>
        <div class="data-panel">
            <div id="sysStatus" class="status-badge state-monitoring">SYSTEM MONITORING</div>
            <div>Sensitivity: <span id="sensitivityVal" class="val">0.00</span></div>
            <div style="font-size: 0.8rem; color: #666;">
                * Trigger: > 0.25<br>
                * Release: < 0.10 + 2s Buffer
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('sysStatus');
        
        let faceLandmarker, audioCtx, alarmOsc, gainNode;
        let isAlarmActive = false;
        let cooldownStartTime = 0; // Used for the 2-second buffer

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            };

            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
                runningMode: "VIDEO",
                outputFaceBlendshapes: true
            });
            predict();
        }

        function predict() {
            const results = faceLandmarker.detectForVideo(video, performance.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.faceLandmarks.length > 0) {
                // Visual Mesh
                const drawingUtils = new DrawingUtils(ctx);
                drawingUtils.drawConnectors(results.faceLandmarks[0], FaceLandmarker.FACE_LANDMARKS_TESSELATION, {color: '#00ffff', lineWidth: 1});

                // Calculate Sensitivity (Average of both eyes)
                const blendshapes = results.faceBlendshapes[0].categories;
                const leftBlink = blendshapes.find(s => s.categoryName === 'eyeBlinkLeft').score;
                const rightBlink = blendshapes.find(s => s.categoryName === 'eyeBlinkRight').score;
                const sensitivity = (leftBlink + rightBlink) / 2;
                
                document.getElementById('sensitivityVal').innerText = sensitivity.toFixed(3);

                // --- LOGIC ENGINE ---
                
                // 1. TRIGGER ALARM
                if (sensitivity > 0.25) {
                    cooldownStartTime = 0; // Reset buffer if eyes close again
                    if (!isAlarmActive) triggerAlarm();
                } 
                // 2. CHECK COOLDOWN (Eyes are open < 0.10)
                else if (sensitivity < 0.10) {
                    if (isAlarmActive) {
                        // Start the 2-second safety buffer timer if not already started
                        if (cooldownStartTime === 0) {
                            cooldownStartTime = Date.now();
                            statusEl.innerText = "SAFETY COOLDOWN...";
                            statusEl.className = "status-badge state-cooldown";
                        } 
                        // Check if 2 seconds have passed
                        else if (Date.now() - cooldownStartTime > 2000) {
                            stopAlarm();
                        }
                    }
                }
            }
            requestAnimationFrame(predict);
        }

        function triggerAlarm() {
            isAlarmActive = true;
            statusEl.innerText = "!!! ALARM ACTIVE !!!";
            statusEl.className = "status-badge state-alarming";
            
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            alarmOsc = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            alarmOsc.type = 'sawtooth';
            alarmOsc.frequency.setValueAtTime(440, audioCtx.currentTime);
            alarmOsc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            alarmOsc.start();
        }

        function stopAlarm() {
            isAlarmActive = false;
            cooldownStartTime = 0;
            statusEl.innerText = "SYSTEM MONITORING";
            statusEl.className = "status-badge state-monitoring";
            if (alarmOsc) {
                alarmOsc.stop();
                alarmOsc.disconnect();
            }
        }

        init();
    </script>
</body>
</html>
